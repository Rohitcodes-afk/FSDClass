<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>To Do List</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
        }

        li {
            margin: 10px;
        }
    </style>

</head>

<body>

    <h2>To Do List</h2>

    <input type="text" id="task" placeholder="Enter task">
    <button onclick="addTask()">Add</button>

    <ul id="list"></ul>

    <script>
        let list = document.getElementById("list");
        let tasks = [];

        function addTask() {
            let taskInput = document.getElementById("task").value;

            if (taskInput === "") {
                alert("Please enter a task");
                return;
            }

            tasks.push(taskInput);
            document.getElementById("task").value = "";

            showTasks();
        }

        function showTasks() {
            list.innerHTML = "";

            for (let i = 0; i < tasks.length; i++) {
                list.innerHTML += `
                    <li>
                        ${tasks[i]} 
                        <button onclick="removeTask(${i})">❌</button>
                    </li>
                `;
            }
        }

        function removeTask(index) {
            tasks.splice(index, 1); // remove 1 item from array
            showTasks(); // refresh list
        }

    </script>

</body>

</body>

</html>
