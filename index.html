<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rain Dental - Aesthetic & Implant Centre</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #fff1f1;      
        }


        header {
            position: fixed;
            top: 0;
            left: 0;
            background-color: #333;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .name {
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        #title-bar {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 60px;
            filter: invert(1);
        }

        #title-box h1 {
            margin: 0;
            line-height: 1;
            border-bottom: 2px solid #d90429;
            font-size: 24px;
            color: white;
        }

        #title-box h5 {
            margin: 5px 0 0 0;
            padding: 0;
            font-size: 10px;
            letter-spacing: 1px;
            color: #ddd;
        }

        #nav-link {
            display: flex;
            gap: 25px;
        }

        #nav-link a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        #nav-link a:hover {
            color: #d90429;
        }

        .hero {
            background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("https://images.unsplash.com/photo-1629909613654-28e377c37b09?auto=format&fit=crop&w=1350&q=80");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h2 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .hero-btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #d90429;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: background-color 0.3s;
            text-transform: uppercase;
        }

        .hero-btn:hover {
            background-color: #b00322;
        }

        .services {
            padding: 50px 10%;
            text-align: center;
        }

        .services ul {
            list-style-position: inside;
            padding: 0;
            display: inline-block;
            text-align: left;
        }

        .image-png {
            display: flex;
            padding: 30px;
            column-count: 2;
            justify-items: center;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }


        .first {
            display: flex;
            padding: 9px;
            height: 300px;
            width: 400px;
            justify-content: center;
            box-shadow: 0px 0px 9px 0px;
            position: relative;
        }

        .second {
            display: flex;
            padding: 9px;
            height: 300px;
            width: 400px;
            justify-content: center;
            box-shadow: 0px 0px 9px 0px;
        }

        .third {
            display: flex;
            padding: 9px;
            height: 300px;
            width: 400px;
            justify-content: center;
            box-shadow: 0px 0px 9px 0px;
        }

        .forth {
            display: flex;
            padding: 0px;
            height: 300px;
            width: 400px;
            justify-content: center;
            box-shadow: 0px 0px 9px 0px;
        }

        .fith {
            display: flex;
            padding: 9px;
            height: 300px;
            width: 400px;
            justify-content: center;
            box-shadow: 0px 0px 9px 0px;
        }

        .sixth {
            display: flex;
            padding: 9px;
            height: 300px;
            width: 400px;
            justify-content: center;
            box-shadow: 0px 0px 9px 0px;
        }

        .first:hover {
            animation: mymove 0.45s 1;
        }


        @keyframes mymove {         
            from {
                transform: translateY(20px);
            }

            to {
                transform: translateY();
            }


        }
    </style>
</head>
