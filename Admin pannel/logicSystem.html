<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #main {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        label {
            font-size: 1rem;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #6c63ff;
        }

        #check {
            width: 100%;
            padding: 10px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #check:hover {
            background: #574fd6;
        }

        #box {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <div id="main">
        <form>
            <label><b>Email :</b></label>
            <input class="email" type="text" placeholder="Enter admin email">

            <label><b>Password :</b></label>
            <input class="pass" type="password" placeholder="Enter password">

            <button id="check" type="button"><b>Submit</b></button>

            <div id="box"></div>
        </form>
    </div>

    <script>
        let button = document.getElementById("check");
        let email = document.getElementsByClassName("email")[0];
        let pass = document.getElementsByClassName("pass")[0];
        let box = document.getElementById("box");

        const validEmail = "admin@gmail.com";
        const validPassword = "admin123";

        button.addEventListener("click", () => {

            if (email.value === validEmail && pass.value === validPassword) {
                box.innerText = "Login Successful";
                box.className = "success";

                // ✅ Redirect after 1 second
                setTimeout(() => {
                    window.location.href = "./index.html";
                }, 1000);

            } else {
                box.innerText = "Invalid Username or Password";
                box.className = "error";
                alert("Shai ID&Pass daal joker 🤡.🤡.🤡.")
            }

        });
    </script>

</body>

</html>
